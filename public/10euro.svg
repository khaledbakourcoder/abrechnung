<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-10euro" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e06666" />
            <stop offset="50%" stop-color="#c93b3b" />
            <stop offset="100%" stop-color="#801a1a" />
        </linearGradient>
        <linearGradient id="neon-red-glow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f87171" />
            <stop offset="100%" stop-color="#ef4444" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
        </filter>
    </defs>

    <!-- HINTERGRUND-KACHEL ENTFERNT -> VOLLSTÄNDIG TRANSPARENT -->

    <g transform="translate(60, 60) rotate(-4) translate(-60, -60)" filter="url(#shadow)">
        <rect x="14" y="34" width="92" height="52" rx="4" fill="url(#bg-10euro)" stroke="#5c1313" stroke-width="1.5" />
        <rect x="86" y="34" width="11" height="52" fill="url(#neon-red-glow)" opacity="0.6" />
        <path d="M 40,68 L 40,52 C 40,44 60,44 60,52 L 60,68" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.25" />
        <text x="22" y="66" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="22" fill="#ffffff" opacity="0.9">10</text>
        <text x="54" y="46" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="7" fill="#fca5a5" letter-spacing="0.5">EURO</text>
        <text x="73" y="63" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="12" fill="#f87171">€</text>
    </g>
</svg>
