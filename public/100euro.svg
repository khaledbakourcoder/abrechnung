<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-100euro" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="50%" stop-color="#047857" />
            <stop offset="100%" stop-color="#064e3b" />
        </linearGradient>
        <linearGradient id="neon-green-glow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6ee7b7" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
        </filter>
    </defs>

    <!-- HINTERGRUND-KACHEL ENTFERNT -> VOLLSTÄNDIG TRANSPARENT -->

    <g transform="translate(60, 60) rotate(-4) translate(-60, -60)" filter="url(#shadow)">
        <rect x="12" y="30" width="96" height="60" rx="4" fill="url(#bg-100euro)" stroke="#022c22" stroke-width="1.5" />
        <rect x="82" y="30" width="16" height="60" fill="url(#neon-green-glow)" opacity="0.6" />
        <path d="M 38,64 L 38,46 C 38,44 40,42 43,42 L 57,42 C 60,42 62,44 62,46 L 62,64" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.25" />
        <text x="16" y="66" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="20" fill="#ffffff" opacity="0.9">100</text>
        <text x="50" y="36" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="7" fill="#a7f3d0" letter-spacing="0.5">EURO</text>
        <text x="68" y="58" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="14" fill="#6ee7b7">€</text>
    </g>
</svg>
