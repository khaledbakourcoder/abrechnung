<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="gold-neon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe680" />
            <stop offset="50%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#9a3412" />
        </linearGradient>

        <linearGradient id="silver-neon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="50%" stop-color="#cbd5e1" />
            <stop offset="100%" stop-color="#475569" />
        </linearGradient>

        <linearGradient id="bronze-neon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fca5a5" />
            <stop offset="50%" stop-color="#b45309" />
            <stop offset="100%" stop-color="#451a03" />
        </linearGradient>

        <filter id="coin-shadow" x="-20%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.65" />
        </filter>
    </defs>

    <g filter="url(#coin-shadow)">
        <circle cx="36" cy="54" r="18" fill="url(#bronze-neon)" stroke="#121214" stroke-width="1.5" />
        <circle cx="36" cy="54" r="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-dasharray="3 2" />

        <circle cx="82" cy="48" r="22" fill="url(#gold-neon)" stroke="#121214" stroke-width="1.5" />
        <text x="82" y="55" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="20" fill="#451a03" text-anchor="middle" opacity="0.85">50</text>

        <circle cx="58" cy="72" r="26" fill="url(#gold-neon)" stroke="#121214" stroke-width="1.5" />
        <circle cx="58" cy="72" r="17" fill="url(#silver-neon)" />
        <text x="58" y="79" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="20" fill="#1e1e2f" text-anchor="middle">€</text>
    </g>
</svg>
