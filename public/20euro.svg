<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-20euro" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4ba3e3" />
            <stop offset="50%" stop-color="#1d6fa5" />
            <stop offset="100%" stop-color="#0f3d5c" />
        </linearGradient>
        <linearGradient id="neon-blue-window" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#67e8f9" />
            <stop offset="100%" stop-color="#06b6d4" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
        </filter>
    </defs>

    <!-- HINTERGRUND-KACHEL ENTFERNT -> VOLLSTÄNDIG TRANSPARENT -->

    <g transform="translate(60, 60) rotate(-5) translate(-60, -60)" filter="url(#shadow)">
        <rect x="14" y="34" width="92" height="52" rx="4" fill="url(#bg-20euro)" stroke="#0b2436" stroke-width="1.5" />
        <rect x="86" y="34" width="11" height="52" fill="url(#neon-blue-window)" opacity="0.6" />
        <path d="M 42,66 L 42,48 C 42,44 47,41 51,45 C 55,41 60,44 60,48 L 60,66" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.25" />
        <text x="20" y="66" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="22" fill="#ffffff" opacity="0.9">20</text>
        <text x="53" y="42" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="7" fill="#93c5fd" letter-spacing="0.5">EURO</text>
        <text x="72" y="61" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="13" fill="#67e8f9">€</text>
    </g>
</svg>
