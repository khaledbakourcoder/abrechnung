<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-50euro" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f97316" />
            <stop offset="50%" stop-color="#d97706" />
            <stop offset="100%" stop-color="#7c2d12" />
        </linearGradient>
        <linearGradient id="neon-orange-glow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fde047" />
            <stop offset="100%" stop-color="#ea580c" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
        </filter>
    </defs>

    <!-- HINTERGRUND-KACHEL ENTFERNT -> VOLLSTÄNDIG TRANSPARENT -->

    <g transform="translate(60, 60) rotate(-6) translate(-60, -60)" filter="url(#shadow)">
        <rect x="14" y="32" width="92" height="56" rx="4" fill="url(#bg-50euro)" stroke="#451a03" stroke-width="1.5" />
        <rect x="84" y="32" width="14" height="56" fill="url(#neon-orange-glow)" opacity="0.6" />
        <path d="M 40,66 L 40,48 L 62,48 L 62,66" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.25" />
        <text x="18" y="66" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="22" fill="#ffffff" opacity="0.9">50</text>
        <text x="51" y="42" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="7" fill="#fef08a" letter-spacing="0.5">EURO</text>
        <text x="71" y="62" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="14" fill="#fde047">€</text>
    </g>
</svg>
